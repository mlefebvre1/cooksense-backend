services:
  postgres:
    image: postgres:17-alpine
    container_name: cooksense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cooksense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cooksense}
      POSTGRES_DB: ${POSTGRES_DB:-cooksense}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cooksense} -d ${POSTGRES_DB:-cooksense}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
